# Copy to secret.yaml, fill in real values, and DO NOT commit secret.yaml.
#   kubectl apply -f k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: healthplanet-garmin-sync
  namespace: healthplanet-garmin-sync
type: Opaque
stringData:
  HEALTHPLANET_CLIENT_ID: "your_client_id"
  HEALTHPLANET_CLIENT_SECRET: "your_client_secret"
  HEALTHPLANET_REDIRECT_URI: "https://www.healthplanet.jp/success.html"
  GARMIN_EMAIL: "you@example.com"
  GARMIN_PASSWORD: "your_password"
