apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: healthplanet-garmin-sync-data
  namespace: healthplanet-garmin-sync
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
  # Uses the cluster's default storageClass when unset. Set it explicitly if your
  # cluster has no default (e.g. local-path on some lightweight distributions).
  # storageClassName: local-path
